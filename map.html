<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueMap 地图 - 墨白的养老小服</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            height: 80vh;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 20px 20px 10px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding: 0 8px;
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #43a047, #66bb6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav a {
            color: #ccc;
            text-decoration: none;
            padding: 8px 22px;
            border-radius: 30px;
            background: rgba(255,255,255,0.06);
            transition: 0.25s;
            border: 1px solid rgba(255,255,255,0.04);
            font-size: 0.95rem;
        }
        .nav a:hover {
            background: #43a047;
            color: #0f0f1a;
            border-color: #43a047;
        }
        .map-wrapper {
            flex: 1;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            min-height: 0;
        }
        .map-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #1a1a2e;
            display: block;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .container {
                height: 75vh;
                padding: 14px 14px 8px 14px;
                border-radius: 18px;
            }
            .header { margin-bottom: 10px; padding: 0 4px; }
            .header h1 { font-size: 1.2rem; }
            .nav a { font-size: 0.8rem; padding: 6px 14px; border-radius: 24px; }
            .map-wrapper { border-radius: 12px; }
        }
        @media (max-width: 400px) {
            body { padding: 8px; }
            .container {
                height: 70vh;
                padding: 10px 10px 6px 10px;
                border-radius: 14px;
            }
            .header h1 { font-size: 1.0rem; }
            .nav a { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; }
            .map-wrapper { border-radius: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ BlueMap 地图</h1>
            <div class="nav">
                <a href="index.html">🏠 返回主页</a>
            </div>
        </div>

        <div class="map-wrapper">
            <iframe 
                src="http://map.mobbb.top:8100/#world:0:0:0:0:0:0:0:1:flat" 
                allowfullscreen 
                loading="lazy">
            </iframe>
        </div>
    </div>
</body>
</html>
