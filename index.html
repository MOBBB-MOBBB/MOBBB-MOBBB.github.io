<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器状态 - 墨白的养老小服</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            height: 80vh;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.03);
            border-radius: 24px;
            padding: 20px 20px 10px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            gap:12px;
            margin-bottom: 16px;
            padding: 0 8px;
            flex-shrink: 0;
        }
        .nav{
            display:flex;
            gap:10px;
        }
        .nav a, #queryBtn {
            color: #ccc;
            text-decoration: none;
            padding: 8px 22px;
            border-radius: 30px;
            background: rgba(255,255,255,0.06);
            transition: 0.25s;
            border: 1px solid rgba(255,255,255,0.04);
            font-size: 0.95rem;
            cursor:pointer;
            font-family: inherit;
        }
        .nav a:hover, #queryBtn:hover {
            background: #43a047;
            color: #0f0f1a;
            border-color: #43a047;
        }

        .content-wrap{
            flex:1;
            overflow-y:auto;
            padding:4px;
        }

        .panel{
            background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:16px;
            padding:32px 24px;
        }
        .main-title{
            text-align:center;
            font-size:2.2rem;
            font-weight:700;
            background: linear-gradient(135deg, #43a047, #66bb6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom:30px;
        }

        .info-grid{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
            gap:16px;
            margin-bottom:24px;
        }
        .info-card{
            background:rgba(255,255,255,0.05);
            border-radius:12px;
            padding:16px;
            text-align:center;
        }
        .info-card .label{
            font-size:0.85rem;
            color:#aaaaaa;
            margin-bottom:6px;
        }
        .info-card .val-online{
            color:#66bb6a;
            font-weight:bold;
            font-size:1.1rem;
        }
        .info-card .val-offline{
            color:#ef5350;
            font-weight:bold;
            font-size:1.1rem;
        }
        .motd-box{
            background:rgba(255,255,255,0.05);
            border-radius:12px;
            padding:16px;
            margin-bottom:24px;
        }
        .motd-box .title{
            color:#aaa;
            font-size:0.85rem;
            margin-bottom:8px;
        }
        .player-section .title{
            margin-bottom:14px;
            font-size:1.05rem;
        }
        .player-list{
            display:grid;
            grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
            gap:12px;
        }
        .player-item{
            background:rgba(255,255,255,0.05);
            border-radius:12px;
            padding:12px 16px;
            display:flex;
            align-items:center;
            gap:12px;
            transition:.25s ease;
            border:1px solid transparent;
        }
        .player-item:hover{
            background:rgba(255,255,255,0.08);
            border-color: rgba(102,187,106,0.3);
            transform: translateY(-2px);
        }
        .player-avatar{
            width:36px;
            height:36px;
            border-radius:8px;
            object-fit:cover;
            background:#333;
        }
        .player-name{
            font-size:0.95rem;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .tip-empty{
            color:#999;
            text-align:center;
            padding:32px;
        }
        .loading, .offline-tip{
            text-align:center;
            padding:40px 10px;
        }
        .offline-tip h3{
            color:#ef5350;
            margin-bottom:8px;
        }
        .hidden{
            display:none !important;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .container {
                height: 75vh;
                padding: 14px 14px 8px 14px;
                border-radius: 18px;
            }
            .header { margin-bottom: 10px; padding: 0 4px; }
            .main-title{
                font-size:1.6rem;
            }
            .nav a, #queryBtn { font-size: 0.8rem; padding: 6px 14px; border-radius: 24px; }
            .panel{
                padding:20px 16px;
                border-radius:12px;
            }
            .player-list{
                grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
            }
            .player-avatar{
                width:32px;
                height:32px;
            }
        }
        @media (max-width: 400px) {
            body { padding: 8px; }
            .container {
                height: 70vh;
                padding: 10px 10px 6px 10px;
                border-radius: 14px;
            }
            .main-title{
                font-size:1.3rem;
            }
            .nav a, #queryBtn { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; }
            .player-list{
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav">
                <a href="map.html">🗺️ BlueMap地图</a>
                <button id="queryBtn">🔄 刷新状态</button>
            </div>
        </div>

        <div class="content-wrap">
            <div class="panel">
                <h2 class="main-title">墨白的养老小服</h2>
                <!--加载-->
                <div id="loadingBox" class="loading">
                    <p>正在获取服务器信息...</p>
                </div>
                <!--离线-->
                <div id="offlineBox" class="offline-tip hidden">
                    <h3>服务器离线 / 连接失败</h3>
                    <p>暂时无法访问服务器，请稍后重试</p>
                </div>
                <!--在线内容-->
                <div id="onlineBox" class="hidden">
                    <div class="info-grid">
                        <div class="info-card">
                            <div class="label">服务器状态</div>
                            <div class="val-online" id="statusText">在线</div>
                        </div>
                        <div class="info-card">
                            <div class="label">在线玩家</div>
                            <div class="val-online"><span id="onlinePlayers">0</span>/<span id="maxPlayers">0</span></div>
                        </div>
                    </div>

                    <div class="motd-box">
                        <div class="title">服务器标语 MOTD</div>
                        <div id="serverMotd"></div>
                    </div>

                    <div class="player-section">
                        <div class="title">👥 当前在线玩家</div>
                        <div id="playerList" class="player-list"></div>
                        <div id="noPlayerTip" class="tip-empty hidden">暂无玩家在线</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
const SERVER_HOST = "mc.mobbb.top";
const queryBtn = document.getElementById('queryBtn');
const loadingBox = document.getElementById('loadingBox');
const offlineBox = document.getElementById('offlineBox');
const onlineBox = document.getElementById('onlineBox');
const playerList = document.getElementById('playerList');
const noPlayerTip = document.getElementById('noPlayerTip');

function queryServer() {
    loadingBox.classList.remove('hidden');
    offlineBox.classList.add('hidden');
    onlineBox.classList.add('hidden');
    playerList.innerHTML = '';

    fetch(`https://api.mcsrvstat.us/2/${SERVER_HOST}`)
    .then(res=>res.json())
    .then(data=>{
        loadingBox.classList.add('hidden');
        if(!data.online){
            offlineBox.classList.remove('hidden');
            return;
        }
        onlineBox.classList.remove('hidden');

        // 在线人数
        document.getElementById('onlinePlayers').innerText = data.players?.online || 0;
        document.getElementById('maxPlayers').innerText = data.players?.max || 0;

        // MOTD
        let motdText = data.motd?.clean?.join('\n') || "";
        document.getElementById('serverMotd').innerText = motdText;

        const players = data.players?.list || [];
        if(players.length === 0){
            noPlayerTip.classList.remove('hidden');
        }else{
            noPlayerTip.classList.add('hidden');
            players.forEach(name=>{
                const div = document.createElement('div');
                div.className = "player-item";
                div.innerHTML = `
                    <img class="player-avatar" src="https://mc-heads.net/avatar/${name}" alt="${name}" loading="lazy">
                    <span class="player-name">${name}</span>
                `;
                playerList.appendChild(div);
            })
        }
    })
    .catch(err=>{
        loadingBox.classList.add('hidden');
        offlineBox.classList.remove('hidden');
        console.error(err);
    })
}

queryBtn.addEventListener('click', queryServer);
window.onload = queryServer;
</script>
</body>
</html>
